# Default parameters for NEB calculations.
# All values can be overridden by the LLM agent or user prompt.

relaxation:
  optimizer_1: FIRE
  optimizer_1_max_steps: 500
  optimizer_2: BFGS
  fmax: 0.05                  # eV/Å

neb:
  n_images: auto              # auto = max(n_images_min, round(path_length_Å / images_per_angstrom))
  images_per_angstrom: 1.0
  n_images_min: 9
  method: improvedtangent     # improvedtangent | string | spline | eb (fixed; not LLM-adjustable)
  optimizer: FIRE2             # FIRE2 | MDMin — LLM-adjustable via switch_optimizer (BFGS/LBFGS excluded, see references/neb_method.md)
  interpolation: linear        # idpp | linear  (linear safer for periodic cells)
  spring_constant: 0.5        # eV/Å
  remove_rotation_translation: true
  phase1_fmax: 0.3            # eV/Å — standard NEB convergence target
  phase1_max_steps: 200
  phase2_fmax: 0.05           # eV/Å — CI-NEB convergence target
  phase2_max_steps: 300

retry:
  max_attempts: 5
  fallback_optimizer: MDMin

alcf:
  base_url: https://inference-api.alcf.anl.gov/resource_server/sophia/vllm/v1
  model: meta-llama/Meta-Llama-3.1-70B-Instruct

# ── endpoint structure files (set by CLI / step1-load/load_xyz.py) ───────────
input:
  initial_xyz: null
  final_xyz:   null

# ── MLIP campaign list (used by step0-multi/runner.py) ───────────────────────
# One model per family for an apples-to-apples comparison. See
# assets/mlip_registry.yaml for the full set of available MLIPs.
mlips:
  - mace-omat
  - nequip-oam-l
  - allegro-oam-l

# ── execution mode ────────────────────────────────────────────────────────────
execution:
  mode: interactive     # interactive | slurm  (asked at runtime if not set)
  slurm_partition: gpu
  slurm_time: "02:00:00"
  slurm_nodes: 1
  slurm_gpus_per_node: 1
  slurm_account: m5047
